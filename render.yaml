# Render Blueprint — API backend (repo root)
# Dashboard: Build Command = npm install && npm run build:api
#            Start Command  = node server.js
services:
  - type: web
    name: workspace-backend
    runtime: node
    buildCommand: npm install && npm run build:api
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
        optional: true
