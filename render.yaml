services:
  - type: web
    name: nexus-workspace-api
    runtime: node
    rootDir: backend-fastify
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
        optional: true
